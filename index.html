<!DOCTYPE html>
<html lang="zh-Hant" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>簽到退系統 | 教師教學成長與培育研討會</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Inter"', '"Noto Sans TC"', 'sans-serif'],
                        tech: ['"Inter"', 'sans-serif'],
                    },
                    colors: {
                        tech: {
                            bg: '#fbfdff',
                            panel: '#ffffff',
                            primary: '#0284c7',
                            primaryDeep: '#0c4a6e',
                            primaryLight: '#38bdf8',
                            secondary: '#7c3aed',
                            accent: '#0891b2',
                            text: '#0f172a',
                            textMuted: '#475569'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* 動態主題 CSS 變數定義 */
        :root {
            --theme-primary: #0284c7; /* 預設藍色 (前測) */
            --theme-light: #f0f9ff;
            --theme-bg-gradient: radial-gradient(circle at 10% 10%, rgba(186, 230, 253, 0.15), transparent 30%), radial-gradient(circle at 90% 90%, rgba(165, 243, 252, 0.15), transparent 30%);
        }
        
        [data-theme="post"] {
            --theme-primary: #334155; /* 深石板灰 (後測/白色主體) */
            --theme-light: #f8fafc;
            --theme-bg-gradient: radial-gradient(circle at 10% 10%, rgba(226, 232, 240, 0.4), transparent 30%), radial-gradient(circle at 90% 90%, rgba(241, 245, 249, 0.4), transparent 30%);
        }

        body {
            background-color: #fbfdff; 
            color: #0f172a;
            background-image: 
                var(--theme-bg-gradient),
                linear-gradient(to right, rgba(15, 23, 42, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(15, 23, 42, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            background-attachment: fixed;
            overflow-x: hidden;
            transition: background-image 0.5s ease;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        /* 主題文字漸層 (支援動態切換) */
        .theme-text-gradient {
            background: linear-gradient(135deg, var(--theme-primary), #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        /* 自訂單選/複選框樣式，綁定 CSS 變數 */
        .custom-radio:checked + div {
            background-color: var(--theme-primary);
            border-color: var(--theme-primary);
            color: white;
        }
        .custom-checkbox:checked + div {
            background-color: var(--theme-light);
            border-color: var(--theme-primary);
            color: var(--theme-primary);
        }
        .custom-checkbox:checked + div svg {
            opacity: 1;
        }

        /* Hover 狀態綁定 */
        .hover-theme-border:hover {
            border-color: var(--theme-primary) !important;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="antialiased min-h-[100dvh] relative flex flex-col" data-theme="pre">

    <canvas id="particleCanvas"></canvas>
    
    <!-- 導航列 -->
    <nav class="sticky top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-slate-100 h-16 transition-colors duration-300" id="main-nav">
        <div class="max-w-4xl mx-auto px-4 h-full flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full border border-slate-200 flex items-center justify-center bg-white overflow-hidden">
                    <img src="https://raw.githubusercontent.com/shiyun0310/1150516-Faculty-Development/main/LINE%E9%A0%AD%E8%B2%BC-3.jpg" alt="Logo" class="w-full h-full object-cover" onerror="this.onerror=null; this.parentElement.innerHTML='<i data-lucide=\'cpu\' class=\'text-slate-500 w-4 h-4\'></i>'; lucide.createIcons();">
                </div>
                <span class="font-bold text-tech-text text-sm sm:text-base tracking-wide">奇美醫院<span id="nav-brand-text" class="text-tech-primary transition-colors duration-300">教學部</span></span>
            </div>
            <div id="system-mode-indicator" class="text-xs font-bold px-3 py-1 bg-sky-100 text-tech-primary rounded-full transition-colors duration-300">
                報到與問卷系統
            </div>
        </div>
    </nav>

    <!-- 主內容區 -->
    <main class="flex-grow flex items-center justify-center p-4 sm:p-6 pb-24 sm:pb-12 w-full max-w-4xl mx-auto z-10 relative">
        
        <!-- 狀態區塊 1: 身分搜尋 (Search Phase) -->
        <div id="phase-search" class="w-full max-w-md animate-float">
            <div class="glass-panel rounded-3xl p-6 sm:p-8 space-y-6">
                <div class="text-center space-y-2">
                    <div id="search-icon-bg" class="w-16 h-16 bg-sky-50 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-inner text-tech-primary transition-colors duration-300">
                        <i data-lucide="scan-line" class="w-8 h-8"></i>
                    </div>
                    <h2 class="text-2xl font-black theme-text-gradient">研討會報到 / 簽退</h2>
                    <p class="text-sm text-tech-textMuted font-medium">請輸入您的<strong id="search-highlight-text" class="text-tech-primary transition-colors duration-300">姓名關鍵字</strong>進行身分驗證</p>
                </div>

                <!-- 智慧時間狀態顯示區 (取代手動切換按鈕) -->
                <div id="time-status-container" class="flex flex-col items-center justify-center p-4 bg-slate-50 rounded-xl mb-4 border border-slate-100 transition-all duration-300">
                    <div id="time-status-badge" class="px-3 py-1.5 bg-slate-200 text-slate-600 font-bold rounded-full text-xs sm:text-sm mb-2 flex items-center gap-2">
                        <i data-lucide="clock" class="w-4 h-4"></i>
                        <span>系統時間偵測中...</span>
                    </div>
                    <p id="time-status-message" class="text-xs sm:text-sm text-slate-500 font-medium text-center">正在驗證您的存取權限</p>
                    
                    <!-- 測試模式控制項 (正式上線前使用) -->
                    <div id="debug-controls" class="mt-3 w-full hidden border-t border-slate-200 pt-3">
                        <p class="text-[10px] text-slate-400 text-center mb-2 font-bold uppercase tracking-widest">Debug Mode 開啟中</p>
                        <div class="flex gap-2">
                            <button type="button" onclick="forceContext('check-in')" class="flex-1 py-1.5 text-xs font-bold rounded-lg shadow-sm bg-white border border-sky-200 text-tech-primary hover:bg-sky-50">模擬簽到時段</button>
                            <button type="button" onclick="forceContext('check-out')" class="flex-1 py-1.5 text-xs font-bold rounded-lg shadow-sm bg-white border border-slate-300 text-slate-700 hover:bg-slate-100">模擬簽退時段</button>
                        </div>
                    </div>
                </div>

                <div class="relative transition-opacity duration-300" id="search-input-area">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i data-lucide="search" class="w-5 h-5 text-slate-400"></i>
                    </div>
                    <input type="text" id="name-input" autocomplete="off" class="w-full pl-11 pr-4 py-3.5 bg-white border-2 border-slate-200 rounded-xl text-tech-text placeholder-slate-400 focus:outline-none focus:border-[var(--theme-primary)] focus:ring-4 focus:ring-slate-100 transition-all font-medium text-lg disabled:bg-slate-50 disabled:text-slate-400 disabled:cursor-not-allowed" placeholder="例如：陳">
                <!-- 標頭資訊 -->
                <div class="border-b border-slate-200 pb-5 mb-6">
                    <div class="flex items-center justify-between mb-4">
                        <button type="button" onclick="cancelForm()" class="flex items-center gap-1.5 text-slate-500 hover:text-[var(--theme-primary)] transition-colors text-sm font-bold bg-slate-50 hover:bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200">
                            <i data-lucide="arrow-left" class="w-4 h-4"></i> 返回重新選擇
                        </button>
                        <div class="text-right">
                            <span id="user-badge" class="inline-flex items-center gap-1.5 px-3 py-1 bg-sky-50 text-tech-primary rounded-lg text-sm font-bold border border-sky-100 transition-colors duration-300">
                                <i data-lucide="user" class="w-4 h-4"></i>
                                <span id="display-name">陳Ｏ明</span>
                            </span>
                        </div>
                    </div>
                    <div>
                        <h2 id="form-title" class="text-xl sm:text-2xl font-black text-tech-primary transition-colors duration-300 mb-1">前測問卷</h2>
                        <p class="text-xs sm:text-sm text-tech-textMuted font-medium">1150516「教師教學成長與培育研討會」</p>
                    </div>
                    <div class="mt-4 p-3 sm:p-4 bg-amber-50 border border-amber-100 rounded-xl">
                        <p id="form-description" class="text-xs sm:text-sm text-amber-800 font-medium leading-relaxed">
                            為瞭解您目前在兩堂課程相關面向的自我認知狀態，請依您「當下」的感受填答。
                        </p>
                    </div>
                </div>

                <form id="questionnaire-form" onsubmit="handleFormSubmit(event)" class="space-y-8 sm:space-y-10">
                    <!-- 動態問卷內容區 -->
                    <div id="form-content" class="space-y-8"></div>

                    <!-- 提交按鈕 -->
                    <div class="pt-6 sm:pt-8 border-t border-slate-200 pb-8 sm:pb-0">
                        <button type="submit" id="submit-btn" class="w-full flex justify-center items-center gap-2 py-4 px-6 bg-tech-primary text-white rounded-xl font-bold text-lg transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5 active:scale-95">
                            <i data-lucide="send" class="w-5 h-5"></i>
                            <span>確認送出並完成作業</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 狀態區塊 3: 完成畫面 (Success Phase) -->
        <div id="phase-success" class="w-full max-w-md hidden animate-float">
            <div class="glass-panel rounded-3xl p-8 sm:p-10 text-center space-y-6">
                <div class="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mx-auto shadow-inner text-green-500">
                    <i data-lucide="check-circle-2" class="w-10 h-10"></i>
                </div>
                <div class="space-y-2">
                    <h2 class="text-2xl font-black text-tech-text">資料寫入成功</h2>
                    <p id="success-msg" class="text-sm text-tech-textMuted font-medium">感謝您的填寫，已完成簽到程序。</p>
                </div>
                <button type="button" onclick="resetSystem()" class="mt-4 px-6 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl font-bold text-sm transition-all">
                    返回首頁
                </button>
            </div>
        </div>

    </main>

    <script>
        lucide.createIcons();

        // 系統狀態
        let currentContext = 'check-in'; // 'check-in' 或 'check-out'
        let currentUser = null;
        
        // 開發測試模式：設為 false 時將嚴格執行時間鎖定 (活動當天請改為 false)
        const TEST_MODE = true; 

        // --- 主題切換引擎 (Theming Engine) ---
        const THEMES = {
            'check-in': {
                name: 'pre',
                primary: 'text-tech-primary',
                bgLight: 'bg-sky-50',
                borderLight: 'border-sky-100',
                btn: 'bg-tech-primary hover:bg-tech-primaryDeep',
                focusRing: 'focus:ring-tech-primary'
            },
            'check-out': {
                name: 'post',
                primary: 'text-slate-800',
                bgLight: 'bg-slate-100',
                borderLight: 'border-slate-200',
                btn: 'bg-slate-800 hover:bg-slate-900',
                focusRing: 'focus:ring-slate-800'
            }
        };

        function updateUITreme() {
            const theme = THEMES[currentContext];
            
            // 寫入 CSS 變數控制根節點
            document.body.setAttribute('data-theme', theme.name);

            // 更新按鈕狀態 (已移除實體按鈕，改為純 UI 主題更新)
            // document.getElementById('btn-ctx-in').className = ...
            // document.getElementById('btn-ctx-out').className = ...

            // 更新導航列與首頁圖示
            document.getElementById('nav-brand-text').className = `${theme.primary} transition-colors duration-300`;
            document.getElementById('system-mode-indicator').className = `text-xs font-bold px-3 py-1 ${theme.bgLight} ${theme.primary} rounded-full transition-colors duration-300`;
            document.getElementById('search-icon-bg').className = `w-16 h-16 ${theme.bgLight} rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-inner ${theme.primary} transition-colors duration-300`;
            document.getElementById('search-highlight-text').className = `${theme.primary} transition-colors duration-300`;
            
            // 更新表單標頭
            document.getElementById('form-title').className = `text-xl sm:text-2xl font-black ${theme.primary} transition-colors duration-300 mb-1`;
            document.getElementById('user-badge').className = `inline-flex items-center gap-1.5 px-3 py-1 ${theme.bgLight} ${theme.primary} rounded-lg text-sm font-bold border ${theme.borderLight} transition-colors duration-300`;
            
            // 更新送出按鈕
            document.getElementById('submit-btn').className = `w-full flex justify-center items-center gap-2 py-4 px-6 ${theme.btn} text-white rounded-xl font-bold text-lg transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5`;
        }

        // 模擬資料庫
        const mockUsers = [
            { uid: 'A001', name: '陳小明', category: '西醫師', dept: '教學部', title: '主治醫師' },
            { uid: 'A002', name: '林華', category: '護理師', dept: '急診醫學部', title: '護理長' },
            { uid: 'A003', name: '王大強', category: '醫事放射師', dept: '放射線部', title: '醫事放射師' },
            { uid: 'A004', name: '陳詩芸', category: '行政人員', dept: '教學部', title: '專員' }
        ];

        // --- 智慧時間鎖定引擎 (Time-based Access Control) ---
        function checkEventTime() {
            const now = new Date();
            const eventDateStr = '2026-05-16';
            
            // 定義開放時間 (24小時制字串比較)
            const checkInStart = '12:00';
            const checkInEnd = '13:00';
            const checkOutStart = '15:30';
            const checkOutEnd = '16:45';

            // 取得目前時間的字串 (HH:MM)
            const currentHour = now.getHours().toString().padStart(2, '0');
            const currentMinute = now.getMinutes().toString().padStart(2, '0');
            const currentTimeStr = `${currentHour}:${currentMinute}`;
            
            // 取得目前日期 (YYYY-MM-DD)
            const todayStr = now.getFullYear() + '-' + 
                             (now.getMonth() + 1).toString().padStart(2, '0') + '-' + 
                             now.getDate().toString().padStart(2, '0');

            const badge = document.getElementById('time-status-badge');
            const msg = document.getElementById('time-status-message');
            const inputArea = document.getElementById('name-input');
            const container = document.getElementById('time-status-container');
            const debugControls = document.getElementById('debug-controls');

            // 判斷邏輯
            let isCheckInTime = (todayStr === eventDateStr) && (currentTimeStr >= checkInStart && currentTimeStr <= checkInEnd);
            let isCheckOutTime = (todayStr === eventDateStr) && (currentTimeStr >= checkOutStart && currentTimeStr <= checkOutEnd);

            if (TEST_MODE) {
                debugControls.classList.remove('hidden');
                // 測試模式下，如果不在任何時段內，預設解鎖並設定為簽到
                if (!isCheckInTime && !isCheckOutTime) {
                    isCheckInTime = true; 
                    msg.innerText = "【測試模式】目前非活動時間，已強制解鎖";
                }
            }

            if (isCheckInTime) {
                currentContext = 'check-in';
                badge.innerHTML = `<i data-lucide="check-circle" class="w-4 h-4"></i><span>簽到開放中</span>`;
                badge.className = "px-3 py-1.5 bg-sky-100 text-tech-primary font-bold rounded-full text-xs sm:text-sm mb-2 flex items-center gap-2";
                if(!TEST_MODE) msg.innerText = `開放時間：${checkInStart} ~ ${checkInEnd}`;
                inputArea.disabled = false;
                container.className = "flex flex-col items-center justify-center p-4 bg-sky-50/50 rounded-xl mb-4 border border-sky-100 transition-all duration-300";
            } else if (isCheckOutTime) {
                currentContext = 'check-out';
                badge.innerHTML = `<i data-lucide="check-circle" class="w-4 h-4"></i><span>簽退開放中</span>`;
                badge.className = "px-3 py-1.5 bg-slate-200 text-slate-700 font-bold rounded-full text-xs sm:text-sm mb-2 flex items-center gap-2";
                if(!TEST_MODE) msg.innerText = `開放時間：${checkOutStart} ~ ${checkOutEnd}`;
                inputArea.disabled = false;
                container.className = "flex flex-col items-center justify-center p-4 bg-slate-100/50 rounded-xl mb-4 border border-slate-200 transition-all duration-300";
            } else {
                // 不在任何開放時間內 (系統上鎖)
                badge.innerHTML = `<i data-lucide="lock" class="w-4 h-4"></i><span>系統暫停服務</span>`;
                badge.className = "px-3 py-1.5 bg-red-50 text-red-500 font-bold rounded-full text-xs sm:text-sm mb-2 flex items-center gap-2";
                msg.innerHTML = `目前非報到或簽退時間<br><span class="text-xs text-slate-400 mt-1 block">簽到: ${checkInStart}-${checkInEnd} | 簽退: ${checkOutStart}-${checkOutEnd}</span>`;
                inputArea.disabled = true;
                inputArea.placeholder = "非開放時間，無法輸入";
                container.className = "flex flex-col items-center justify-center p-4 bg-red-50/30 rounded-xl mb-4 border border-red-100 transition-all duration-300";
            }

            updateUITreme();
            lucide.createIcons();
        }

        // 提供測試模式強制切換的函式
        function forceContext(ctx) {
            currentContext = ctx;
            const badge = document.getElementById('time-status-badge');
            const msg = document.getElementById('time-status-message');
            const inputArea = document.getElementById('name-input');
            
            inputArea.disabled = false;
            inputArea.placeholder = "例如：陳";
            
            if(ctx === 'check-in') {
                badge.innerHTML = `<i data-lucide="check-circle" class="w-4 h-4"></i><span>強制簽到模式</span>`;
                badge.className = "px-3 py-1.5 bg-sky-100 text-tech-primary font-bold rounded-full text-xs sm:text-sm mb-2 flex items-center gap-2";
            } else {
                badge.innerHTML = `<i data-lucide="check-circle" class="w-4 h-4"></i><span>強制簽退模式</span>`;
                badge.className = "px-3 py-1.5 bg-slate-200 text-slate-700 font-bold rounded-full text-xs sm:text-sm mb-2 flex items-center gap-2";
            }
            msg.innerText = "已透過測試控制項強大切換主題";
            
            updateUITreme();
            lucide.createIcons();
        }

        function setContext(ctx) {
            currentContext = ctx;
            updateUITreme();
            document.getElementById('name-input').value = '';
            document.getElementById('search-results').classList.add('hidden');
        }

        const searchInput = document.getElementById('name-input');
        const searchResults = document.getElementById('search-results');

        searchInput.addEventListener('input', function(e) {
            const keyword = e.target.value.trim();
            if (keyword.length < 1) {
                searchResults.classList.add('hidden');
                return;
            }
            const results = mockUsers.filter(u => u.name.includes(keyword));
            if (results.length > 0) {
                const themeBgHover = currentContext === 'check-in' ? 'hover:bg-sky-50' : 'hover:bg-slate-100';
                searchResults.innerHTML = results.map(u => `
                    <button type="button" onclick="selectUser('${u.uid}')" class="w-full text-left px-4 py-3 ${themeBgHover} border-b border-slate-100 last:border-0 transition-colors flex flex-col">
                        <span class="font-bold text-tech-text text-lg">${u.name}</span>
                        <span class="text-xs text-tech-textMuted font-medium">${u.category} - ${u.dept} - ${u.title}</span>
                    </button>
                `).join('');
                searchResults.classList.remove('hidden');
            } else {
                searchResults.innerHTML = `<div class="px-4 py-4 text-center text-slate-400 text-sm">找不到相符的名單</div>`;
                searchResults.classList.remove('hidden');
            }
        });

        function selectUser(uid) {
            currentUser = mockUsers.find(u => u.uid === uid);
            document.getElementById('phase-search').classList.add('hidden');
            document.getElementById('phase-form').classList.remove('hidden');
            
            document.getElementById('display-name').innerText = currentUser.name;
            const schema = currentContext === 'check-in' ? QUESTIONS.preTest : QUESTIONS.postTest;
            document.getElementById('form-title').innerText = schema.title;
            document.getElementById('form-description').innerText = schema.desc;
            
            renderForm(schema);
            window.scrollTo(0, 0);
        }

        function renderForm(schema) {
            const container = document.getElementById('form-content');
            let html = '';
            const theme = THEMES[currentContext];

            schema.sections.forEach((sec, sIdx) => {
                // 區塊標題色彩動態渲染
                const headerTextClass = currentContext === 'check-in' ? 'text-tech-primaryDeep' : 'text-slate-800';
                
                html += `
                    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                        <div class="bg-slate-50 px-4 py-3 sm:px-6 sm:py-4 border-b border-slate-200">
                            <h3 class="font-black ${headerTextClass} text-lg sm:text-xl">${sec.title}</h3>
                            ${sec.desc ? `<p class="text-xs sm:text-sm text-slate-500 font-medium mt-1">${sec.desc}</p>` : ''}
                        </div>
                        <div class="p-4 sm:p-6 space-y-6 sm:space-y-8">
                `;

                sec.items.forEach((item, iIdx) => {
                    html += `<div class="form-group" id="group_${item.id}">`;
                    html += `<p class="font-bold text-tech-text mb-3 sm:mb-4 text-sm sm:text-base leading-snug">
                                ${iIdx + 1}. ${item.label}
                                ${item.required !== false ? '<span class="text-red-500 ml-1">*</span>' : ''}
                             </p>`;

                    if (item.type === 'likert') {
                        html += `<div class="flex justify-between items-center bg-slate-50/50 p-2 sm:p-3 rounded-xl border border-slate-100 max-w-lg w-full gap-1 sm:gap-2">`;
                        for(let i=1; i<=5; i++) {
                            html += `
                                <label class="relative flex flex-col items-center cursor-pointer group flex-1">
                                    <input type="radio" name="${item.id}" value="${i}" class="sr-only custom-radio" required>
                                    <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-full border-2 border-slate-300 flex items-center justify-center font-bold text-slate-500 transition-all hover-theme-border bg-white shadow-sm">
                                        ${i}
                                    </div>
                                </label>
                            `;
                        }
                        html += `</div>`;
                    } 
                    else if (item.type === 'radio' || item.type === 'checkbox') {
                        const inputType = item.type;
                        html += `<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">`;
                        item.options.forEach((opt, oIdx) => {
                            html += `
                                <label class="flex items-start gap-3 p-3 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-50 transition-colors relative">
                                    <input type="${inputType}" name="${item.id}" value="${opt}" class="mt-0.5 w-4 h-4 text-tech-text border-slate-300 ${theme.focusRing} !accent-[var(--theme-primary)]" style="accent-color: var(--theme-primary);" ${item.required !== false ? 'required' : ''}>
                                    <span class="text-sm font-medium text-slate-700 leading-tight">${opt}</span>
                                </label>
                            `;
                        });
                        
                        if (item.allowOther) {
                            html += `
                                <label class="flex items-start gap-3 p-3 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-50 transition-colors col-span-1 sm:col-span-2 relative">
                                    <input type="${inputType}" name="${item.id}" value="_other_" class="mt-0.5 w-4 h-4 text-tech-text border-slate-300 ${theme.focusRing} toggle-other" style="accent-color: var(--theme-primary);" data-target="${item.id}_other_text">
                                    <span class="text-sm font-medium text-slate-700 leading-tight">${item.otherLabel || '其他'}</span>
                                </label>
                                <div class="col-span-1 sm:col-span-2 hidden mt-2" id="${item.id}_other_text_container">
                                    <input type="text" id="${item.id}_other_text" name="${item.id}_other_text" placeholder="請說明..." class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 ${theme.focusRing}/20 focus:border-[var(--theme-primary)] text-sm outline-none">
                                </div>
                            `;
                        }
                        html += `</div>`;
                    }
                    html += `</div>`;
                });
                
                html += `</div></div>`;
            });

            container.innerHTML = html;
            lucide.createIcons();
            setupOtherToggles();
            setupCheckboxRequiredLogic();
        }

        function setupOtherToggles() {
            document.querySelectorAll('.toggle-other').forEach(el => {
                el.addEventListener('change', (e) => {
                    const targetId = e.target.getAttribute('data-target');
                    const container = document.getElementById(targetId + '_container');
                    const input = document.getElementById(targetId);
                    if (e.target.checked) {
                        container.classList.remove('hidden');
                        input.setAttribute('required', 'required');
                    } else {
                        container.classList.add('hidden');
                        input.removeAttribute('required');
                        input.value = ''; 
                    }
                });
            });
        }

        function setupCheckboxRequiredLogic() {
            const groups = {};
            document.querySelectorAll('input[type="checkbox"][required]').forEach(cb => {
                if(!groups[cb.name]) groups[cb.name] = [];
                groups[cb.name].push(cb);
            });

            for (let name in groups) {
                groups[name].forEach(cb => {
                    cb.addEventListener('change', () => {
                        const isChecked = groups[name].some(c => c.checked);
                        groups[name].forEach(c => {
                            if(isChecked) c.removeAttribute('required');
                            else c.setAttribute('required', 'required');
                        });
                    });
                });
            }
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const payload = {
                uid: currentUser.uid,
                context: currentContext,
                timestamp: new Date().toISOString(),
                data: {}
            };

            for (let [key, value] of formData.entries()) {
                if (!payload.data[key]) {
                    payload.data[key] = value;
                } else {
                    if (!Array.isArray(payload.data[key])) payload.data[key] = [payload.data[key]];
                    payload.data[key].push(value);
                }
            }

            console.log("🚀 Payload:", payload);
            document.getElementById('phase-form').classList.add('hidden');
            document.getElementById('phase-success').classList.remove('hidden');
            
            const msg = currentContext === 'check-in' ? 
                `感謝您的填寫，${currentUser.name} 已完成「簽到」與前測作業。` : 
                `感謝您的填寫，${currentUser.name} 已完成「簽退」與後測作業，一路平安！`;
            document.getElementById('success-msg').innerText = msg;
            window.scrollTo(0, 0);
        }

        function cancelForm() {
            currentUser = null;
            document.getElementById('name-input').value = '';
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('phase-form').classList.add('hidden');
            document.getElementById('phase-search').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function resetSystem() {
            currentUser = null;
            document.getElementById('name-input').value = '';
            document.getElementById('phase-success').classList.add('hidden');
            document.getElementById('phase-search').classList.remove('hidden');
            checkEventTime(); // 重置時重新檢查時間狀態
        }

        // 初始化背景動畫與主題
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = []; let w, h;
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('resize', () => { resize(); initParticles(); });
        class P {
            constructor() { 
                this.x = Math.random() * w; this.y = Math.random() * h; 
                this.vx = (Math.random() - 0.5) * 0.3; this.vy = (Math.random() - 0.5) * 0.3; 
                this.size = Math.random() * 1.5 + 0.5;
            }
            update() { 
                this.x += this.vx; this.y += this.vy; 
                if(this.x < 0 || this.x > w) this.vx *= -1; 
                if(this.y < 0 || this.y > h) this.vy *= -1; 
            }
            draw() { 
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); 
                // 粒子顏色也隨主題動態改變 (利用全域變數判定)
                ctx.fillStyle = document.body.getAttribute('data-theme') === 'post' ? 'rgba(51, 65, 85, 0.1)' : 'rgba(14, 165, 233, 0.15)'; 
                ctx.fill(); 
            }
        }
        function initParticles() { 
            particles = []; const count = Math.min(Math.floor(w / 30), 50);
            for(let i = 0; i < count; i++) particles.push(new P()); 
        }
        function loop() { 
            ctx.clearRect(0, 0, w, h); 
            particles.forEach(p => { p.update(); p.draw(); }); 
            requestAnimationFrame(loop); 
        }
        resize(); initParticles(); loop();
        
        // 啟動預設主題與時間鎖定
        checkEventTime();
        
        // 每分鐘定期檢查一次時間 (防止使用者開著網頁跨越時段)
        setInterval(checkEventTime, 60000);
    </script>
</body>
</html>
